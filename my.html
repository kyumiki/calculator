<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="nav">
            <a href="index.html" class="nav-link">Калькулятор</a>
            <a href="products.html" class="nav-link">Продукты</a>
            <a href="calendar.html" class="nav-link">Календарь</a>
            <a href="my.html" class="nav-link active">Моё</a>
        </div>

        <h1>Мои цели</h1>

        <div class="input-panel">
            <div class="form-row-inline">
                <div>
                    <label>Ккал в день</label>
                    <input type="number" id="goalKcalInput" placeholder="2000" min="0" step="10">
                </div>
                <div>
                    <label>Белки (г)</label>
                    <input type="number" id="goalProteinInput" placeholder="100" min="0" step="1">
                </div>
            </div>
            <div class="form-row-inline">
                <div>
                    <label>Жиры (г)</label>
                    <input type="number" id="goalFatInput" placeholder="60" min="0" step="1">
                </div>
                <div>
                    <label>Углеводы (г)</label>
                    <input type="number" id="goalCarbsInput" placeholder="250" min="0" step="1">
                </div>
            </div>
            <div class="action-buttons" style="margin-top:0.6rem;">
                <button class="btn btn-primary" id="saveGoalsBtn">Сохранить цели</button>
            </div>
        </div>

        <div class="summary" id="myTodaySummary">
            <div>
                <div class="summary-title">Сегодня</div>
                <div class="total-kcal" id="todayKcalDisplay">0 ккал</div>
                <div class="goal-indicator" id="myGoalIndicator" style="display:none;"></div>
            </div>
            <div class="total-macros">
                <div>Б: <span id="todayProtein">0</span> г</div>
                <div>Ж: <span id="todayFat">0</span> г</div>
                <div>У: <span id="todayCarbs">0</span> г</div>
            </div>
        </div>

        <div class="input-panel">
            <div class="week-header">
                <div class="history-title">Статистика за 7 дней</div>
                <div class="week-nav">
                    <button class="btn btn-circle-sm" id="weekPrevBtn">←</button>
                    <button class="btn btn-circle-sm" id="weekNextBtn">→</button>
                </div>
            </div>
            <div class="week-range" id="weekRangeLabel"></div>
            <div id="weekStats"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
