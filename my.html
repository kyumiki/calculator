<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="nav">
            <a href="index.html" class="nav-link">Калькулятор</a>
            <a href="products.html" class="nav-link">Продукты</a>
            <a href="calendar.html" class="nav-link">Календарь</a>
            <a href="my.html" class="nav-link active">Моё</a>
        </div>

        <h1>Мои цели</h1>

        <div class="input-panel">
            <div class="form-row-inline">
                <div>
                    <label>Ккал в день</label>
                    <input type="number" id="goalKcal" placeholder="2000" min="0" step="10">
                </div>
                <div>
                    <label>Белки (г)</label>
                    <input type="number" id="goalProtein" placeholder="100" min="0" step="1">
                </div>
            </div>
            <div class="form-row-inline">
                <div>
                    <label>Жиры (г)</label>
                    <input type="number" id="goalFat" placeholder="60" min="0" step="1">
                </div>
                <div>
                    <label>Углеводы (г)</label>
                    <input type="number" id="goalCarbs" placeholder="250" min="0" step="1">
                </div>
            </div>
            <div class="action-buttons" style="margin-top:0.6rem;">
                <button class="btn btn-primary" id="saveGoalsBtn">Сохранить цели</button>
            </div>
        </div>

        <div class="summary" id="myTodaySummary">
            <div>
                <div class="summary-title">Сегодня</div>
                <div class="total-kcal" id="todayKcalDisplay">0 ккал</div>
                <div class="goal-indicator" id="myGoalIndicator" style="display:none;"></div>
            </div>
            <div class="total-macros">
                <div>Б: <span id="todayProtein">0</span> г</div>
                <div>Ж: <span id="todayFat">0</span> г</div>
                <div>У: <span id="todayCarbs">0</span> г</div>
            </div>
        </div>

        <div class="input-panel">
            <div class="history-title">Прогресс по целям</div>

            <div class="progress-item">
                <div class="progress-label">Калории</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="kcalProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="kcalProgressText">0</span> / <span id="goalKcalDisplay">—</span> ккал</div>
            </div>

            <div class="progress-item">
                <div class="progress-label">Белки</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill protein-fill" id="proteinProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="proteinProgressText">0</span> / <span id="goalProteinDisplay">—</span> г</div>
            </div>

            <div class="progress-item">
                <div class="progress-label">Жиры</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill fat-fill" id="fatProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="fatProgressText">0</span> / <span id="goalFatDisplay">—</span> г</div>
            </div>

            <div class="progress-item">
                <div class="progress-label">Углеводы</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill carbs-fill" id="carbsProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="carbsProgressText">0</span> / <span id="goalCarbsDisplay">—</span> г</div>
            </div>
        </div>

        <div class="input-panel">
            <div class="history-title">Статистика за 7 дней</div>
            <div id="weekStats"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
