<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор КБЖУ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="nav">
            <a href="index.html" class="nav-link active">Калькулятор</a>
            <a href="products.html" class="nav-link">Продукты</a>
            <a href="calendar.html" class="nav-link">Календарь</a>
            <a href="my.html" class="nav-link">Моё</a>
        </div>

        <h1>Калькулятор</h1>

        <div class="input-panel">
            <div class="food-row">
                <div class="food-name">
                    <label>Что было съедено?</label>
                    <select id="foodSelect">
                        <option value="">Выберите продукт</option>
                    </select>
                </div>
                <div class="food-grams">
                    <label>Граммы</label>
                    <input type="number" id="gramsInput" placeholder="100" value="100" min="1" step="any">
                </div>
            </div>

            <div class="macro-section-title">Пищевая ценность</div>
            <div class="macro-display">
                <div class="macro-item-display">
                    <span>Белки: </span><span id="proteinPer100">0</span> г
                </div>
                <div class="macro-item-display">
                    <span>Жиры: </span><span id="fatPer100">0</span> г
                </div>
                <div class="macro-item-display">
                    <span>Углеводы: </span><span id="carbsPer100">0</span> г
                </div>
                <div class="macro-item-display">
                    <span>Ккал: </span><span id="kcalPer100">0</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="addFoodBtn">Добавить в дневник</button>
            </div>
        </div>

        <div class="summary" id="todaySummary">
            <div>
                <div class="summary-title">Съедено сегодня</div>
                <div class="total-kcal" id="totalKcalDisplay">0 ккал</div>
                <div class="goal-indicator" id="goalIndicator" style="display:none;"></div>
            </div>
            <div class="total-macros">
                <div>Б: <span id="totalProtein">0</span> г</div>
                <div>Ж: <span id="totalFat">0</span> г</div>
                <div>У: <span id="totalCarbs">0</span> г</div>
            </div>
        </div>

        <div class="input-panel progress-compact" id="progressPanel">
            <div class="history-title">Прогресс по целям</div>

            <div class="progress-item progress-item-sm">
                <div class="progress-label">Ккал</div>
                <div class="progress-bar-bg progress-bar-bg-sm">
                    <div class="progress-bar-fill" id="kcalProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="kcalProgressText">0</span>/<span id="goalKcalDisplay">—</span></div>
            </div>

            <div class="progress-item progress-item-sm">
                <div class="progress-label">Белки</div>
                <div class="progress-bar-bg progress-bar-bg-sm">
                    <div class="progress-bar-fill protein-fill" id="proteinProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="proteinProgressText">0</span>/<span id="goalProteinDisplay">—</span></div>
            </div>

            <div class="progress-item progress-item-sm">
                <div class="progress-label">Жиры</div>
                <div class="progress-bar-bg progress-bar-bg-sm">
                    <div class="progress-bar-fill fat-fill" id="fatProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="fatProgressText">0</span>/<span id="goalFatDisplay">—</span></div>
            </div>

            <div class="progress-item progress-item-sm">
                <div class="progress-label">Углеводы</div>
                <div class="progress-bar-bg progress-bar-bg-sm">
                    <div class="progress-bar-fill carbs-fill" id="carbsProgress" style="width:0%"></div>
                </div>
                <div class="progress-text"><span id="carbsProgressText">0</span>/<span id="goalCarbsDisplay">—</span></div>
            </div>
        </div>

        <div class="history-title">Список продуктов за сегодня:</div>
        <div class="history-list" id="historyContainer">
            <div class="empty-history">Пока ничего не добавлено</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
