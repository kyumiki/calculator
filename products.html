<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продукты</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="nav">
            <a href="index.html" class="nav-link">Калькулятор</a>
            <a href="products.html" class="nav-link active">Продукты</a>
            <a href="calendar.html" class="nav-link">Календарь</a>
            <a href="my.html" class="nav-link">Моё</a>
        </div>

        <h1>База продуктов</h1>

        <div class="input-panel">
            <div class="product-form">
                <div class="form-row">
                    <label>Название продукта</label>
                    <input type="text" id="productNameInput" placeholder="Например, Творог 5%">
                </div>
                <div class="form-row-inline">
                    <div>
                        <label>Белки (на 100 г)</label>
                        <input type="number" id="productProtein" placeholder="0" min="0" step="0.1">
                    </div>
                    <div>
                        <label>Жиры (на 100 г)</label>
                        <input type="number" id="productFat" placeholder="0" min="0" step="0.1">
                    </div>
                    <div>
                        <label>Углеводы (на 100 г)</label>
                        <input type="number" id="productCarbs" placeholder="0" min="0" step="0.1">
                    </div>
                </div>
                <button class="btn btn-primary" id="saveProductBtn">Сохранить продукт</button>
            </div>
        </div>

        <div class="history-title">Сохраненные продукты:</div>
        <div class="history-list" id="productsListContainer">
            <div class="empty-history">Нет сохраненных продуктов</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
